name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: share-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: share-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: share-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: share-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: share-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/share ${{ matrix.name }}
          sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256 || shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cp target/${{ matrix.target }}/release/share.exe ${{ matrix.name }}
          (Get-FileHash ${{ matrix.name }} -Algorithm SHA256).Hash + "  " + "${{ matrix.name }}" | Out-File -Encoding ascii ${{ matrix.name }}.sha256

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
